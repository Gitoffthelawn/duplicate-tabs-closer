<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Duplicate Tabs Closer Panel</title>
  <link rel="stylesheet" href="../ext_lib/bootstrap-5.3.3-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../ext_lib/font-awesome-6.7/css/all.min.css">
  <link rel="stylesheet" href="optionPage.css">
  <script src="../ext_lib/bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js"></script>
  <script src="../helper.js"></script>
  <script src="optionPage.js"></script>
</head>

<body>
  <div class="panel-group">

    <div class="card shadow-sm" id="optionsCard">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span i18n-content="options"></span>
      </div>
      <div class="card-body">
        <ul class="list-group list-group-flush">
          <li class="list-group-item list-group-item-header">
            <span class="list-group-item-title list-group-expanded" i18n-content="onDuplicateTabDetected" id="onDuplicateTabDetectedTitle"></span>
          </li>
          <li class="list-group-item">
            <div class="form-group" id="onDuplicateTabDetectedBody">
              <select class="form-select form-control-xs" id="onDuplicateTabDetected" name="onDuplicateTabDetected">
                <option value="N" i18n-content="doNothing"></option>
                <option value="A" i18n-content="autoCloseTab"></option>
              </select>
              <div id="onRemainingTabGroup">
                <label class="titleLabel" for="onRemainingTab" i18n-content="onRemainingTab"></label>
                <select class="form-select form-control-xs" id="onRemainingTab" name="onRemainingTab">
                  <option value="N" i18n-content="doNothing"></option>
                  <option value="A" i18n-content="activateKeptTab"></option>
                  <option value="B" i18n-content="defaultTabBehavior"></option>
                </select>
              </div>
              <div id="whiteListGroup">
                <label class="titleLabel" for="whiteList" i18n-content="whiteList"></label>
                <textarea class="form-control rules-textarea" rows="4" id="whiteList"></textarea>
              </div>
            </div>
          </li>
          <li class="list-group-item list-group-item-header">
            <span class="list-group-item-title list-group-expanded" i18n-content="tabPriority" id="tabPriorityTitle"></span>
          </li>
          <li class="list-group-item">
            <div class="form-group" id="tabPriorityBody">
              <select class="form-select form-control-xs" id="keepTabBasedOnAge" name="keepTabBasedOnAge">
                <option value="N" i18n-content="keepNewerTab"></option>
                <option value="O" i18n-content="keepOlderTab"></option>
                <option value="R" i18n-content="keepReloadOlderTab"></option>
              </select>
              <div class="vertical-line"></div>
              <div class="checkboxes">
                <label for="keepTabWithHttps">
                  <input type="checkbox" id="keepTabWithHttps" />
                  <span i18n-content="keepTabWithHttps"></span>
                </label>
              </div>
              <div class="checkboxes">
                <label for="keepPinnedTab">
                  <input type="checkbox" id="keepPinnedTab" />
                  <span i18n-content="keepPinnedTab"></span>
                </label>
              </div>
            </div>
          </li>
          <li class="list-group-item list-group-item-header">
            <span class="list-group-item-title list-group-expanded" i18n-content="matchingRules" id="matchingRulesTitle"></span>
          </li>
          <li class="list-group-item">
            <div class="form-group" id="matchingRulesBody">
              <div class="checkboxes d-flex align-items-center justify-content-between">
                <label for="caseInsensitive">
                  <input type="checkbox" class="checkbox-filter" id="caseInsensitive" />
                  <span i18n-content="caseInsensitive"></span>
                </label>
                <input type="checkbox" class="checkbox-fa" id="caseInsensitive_popup" />
                <label for="caseInsensitive_popup" class="checkbox-fa-label popup-pin-label">
                  <span class="fa-regular fa-eye"></span>
                </label>
              </div>
              <div class="checkboxes d-flex align-items-center justify-content-between">
                <label for="ignore3w">
                  <input type="checkbox" class="checkbox-filter" id="ignore3w" />
                  <span i18n-content="ignore3w"></span>
                </label>
                <input type="checkbox" class="checkbox-fa" id="ignore3w_popup" />
                <label for="ignore3w_popup" class="checkbox-fa-label popup-pin-label">
                  <span class="fa-regular fa-eye"></span>
                </label>
              </div>
              <div class="checkboxes d-flex align-items-center justify-content-between">
                <label for="ignoreHashPart">
                  <input type="checkbox" class="checkbox-filter" id="ignoreHashPart" />
                  <span i18n-content="ignoreHashPart"></span>
                </label>
                <input type="checkbox" class="checkbox-fa" id="ignoreHashPart_popup" />
                <label for="ignoreHashPart_popup" class="checkbox-fa-label popup-pin-label">
                  <span class="fa-regular fa-eye"></span>
                </label>
              </div>
              <div class="checkboxes d-flex align-items-center justify-content-between">
                <label for="ignoreSearchPart">
                  <input type="checkbox" class="checkbox-filter" id="ignoreSearchPart" />
                  <span i18n-content="ignoreSearchPart"></span>
                </label>
                <input type="checkbox" class="checkbox-fa" id="ignoreSearchPart_popup" />
                <label for="ignoreSearchPart_popup" class="checkbox-fa-label popup-pin-label">
                  <span class="fa-regular fa-eye"></span>
                </label>
              </div>
              <div class="checkboxes d-flex align-items-center justify-content-between">
                <label for="ignorePathPart">
                  <input type="checkbox" class="checkbox-filter" id="ignorePathPart" />
                  <span i18n-content="ignorePathPart"></span>
                </label>
                <input type="checkbox" class="checkbox-fa" id="ignorePathPart_popup" />
                <label for="ignorePathPart_popup" class="checkbox-fa-label popup-pin-label">
                  <span class="fa-regular fa-eye"></span>
                </label>
              </div>
              <div class="checkboxes d-flex align-items-center justify-content-between">
                <label for="compareWithTitle">
                  <input type="checkbox" class="checkbox-filter" id="compareWithTitle" />
                  <span i18n-content="compareWithTitle"></span>
                </label>
                <input type="checkbox" class="checkbox-fa" id="compareWithTitle_popup" />
                <label for="compareWithTitle_popup" class="checkbox-fa-label popup-pin-label">
                  <span class="fa-regular fa-eye"></span>
                </label>
              </div>
              <div class="checkboxes checkboxes-threshold">
                <label>
                  <input type="number" id="titleSimilarityThreshold" min="1" max="100" class="form-control-xs" disabled />
                  <span i18n-content="titleSimilarityThreshold"></span>
                </label>
              </div>
              <div class="checkboxes checkboxes-regex-label d-flex align-items-center justify-content-between">
                <label for="urlRegexRules"><span i18n-content="urlRegexRules"></span></label>
                <input type="checkbox" class="checkbox-fa" id="urlRegexRules_popup" />
                <label for="urlRegexRules_popup" class="checkbox-fa-label popup-pin-label">
                  <span class="fa-regular fa-eye"></span>
                </label>
              </div>
              <textarea id="urlRegexRules" class="form-control rules-textarea" rows="3"></textarea>
              <div class="checkboxes checkboxes-regex-label d-flex align-items-center justify-content-between">
                <label for="titleRegexRules"><span i18n-content="titleRegexRules"></span></label>
                <input type="checkbox" class="checkbox-fa" id="titleRegexRules_popup" />
                <label for="titleRegexRules_popup" class="checkbox-fa-label popup-pin-label">
                  <span class="fa-regular fa-eye"></span>
                </label>
              </div>
              <textarea id="titleRegexRules" class="form-control rules-textarea" rows="3"></textarea>
            </div>
          </li>
          <li class="list-group-item list-group-item-header">
            <span class="list-group-item-title list-group-expanded" i18n-content="scope" id="scopeTitle"></span>
          </li>
          <li class="list-group-item">
            <div class="form-group" id="scopeBody">
              <select class="form-select form-control-xs" id="scope" name="scope">
                <option class="containerItem" value="CC" i18n-content="containerActivewindow"></option>
                <option class="containerItem" value="CA" i18n-content="containerAllwindows"></option>
                <option value="C" i18n-content="activeWindow"></option>
                <option value="A" i18n-content="allWindows"></option>
              </select>
            </div>
          </li>
          <li class="list-group-item list-group-item-header">
            <span class="list-group-item-title list-group-expanded" i18n-content="customization" id="customization"></span>
          </li>
          <li class="list-group-item">
            <div class="form-group" id="customizationBody">
              <div class="checkboxes">
                <label for="theme" class="titleLabel" i18n-content="theme"></label>
                <select class="form-select form-control-xs" id="theme" name="theme">
                  <option value="light"    i18n-content="themeLight"></option>
                  <option value="sage"     i18n-content="themeSage"></option>
                  <option value="rose"     i18n-content="themeRose"></option>
                  <option value="amber"    i18n-content="themeAmber"></option>
                  <option value="slate"    i18n-content="themeSlate"></option>
                  <option value="violet"   i18n-content="themeViolet"></option>
                  <option value="ocean"    i18n-content="themeOcean"></option>
                  <option value="charcoal" i18n-content="themeCharcoal"></option>
                  <option value="purple"   i18n-content="themePurple"></option>
                  <option value="teal"     i18n-content="themeTeal"></option>
                  <option value="oled"     i18n-content="themeOled"></option>
                </select>
              </div>
              <div class="checkboxes">
                <label for="openPopupOnDuplicateDetected">
                  <input type="checkbox" id="openPopupOnDuplicateDetected" />
                  <span i18n-content="openPopupOnDuplicateDetected"></span>
                </label>
              </div>
              <div class="checkboxes">
                <label for="closePopup">
                  <input type="checkbox" class="checkbox-filter" id="closePopup" />
                  <span i18n-content="closePopup"></span>
                </label>
              </div>
              <table id="color-container">
                <tr>
                  <td><input class="form-control badgeColor" type="color" value="#563d7c" id="badgeColorDuplicateTabs"></td>
                  <td><label class="label-badgeColor" i18n-content="badgeColorDuplicateTabs" for="badgeColorDuplicateTabs"></label></td>
                </tr>
                <tr>
                  <td><input class="form-control badgeColor" type="color" value="#563d7c" id="badgeColorNoDuplicateTabs"></td>
                  <td><label class="label-badgeColor" i18n-content="badgeColorNoDuplicateTabs" for="badgeColorNoDuplicateTabs"></label></td>
                </tr>
              </table>
              <div class="checkboxes">
                <label for="showBadgeIfNoDuplicateTabs">
                  <input type="checkbox" id="showBadgeIfNoDuplicateTabs" />
                  <span i18n-content="showBadgeIfNoDuplicateTabs"></span>
                </label>
              </div>
            </div>
          </li>
        </ul>
      </div>
    </div>

    <div class="card shadow-sm" id="duplicateTabsCard">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span i18n-content="duplicateTabs"></span>
      </div>
      <div class="card-body">
        <div class="table-scrollable" id="duplicateTabsTableContainer">
          <table class="table table-hover table-borderless" id="duplicateTabsTable">
            <tbody id="duplicateTabsTableBody">
            </tbody>
          </table>
        </div>
      </div>
      <div class="table-footer d-flex">
        <button type="button" class="btn btn-xs btn-close-tabs disabled" id="closeDuplicateTabsBtn" aria-disabled="true" i18n-content="closeAllDuplicateTabs"></button>
      </div>
    </div>

  </div>
</body>

</html>
